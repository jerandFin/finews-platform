<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinNews - Economics Quiz</title>
    <!-- FIX: Correct path to your styles.css based on your file structure -->
    <link rel="stylesheet" href="/public/css/styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">FinNews</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/quiz">Quiz</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>Economics & Finance Quiz</h1>
            <p>Test your knowledge on market patterns and reasoning.</p>
        </header>

        <div class="quiz-section">
            <button id="generate-btn" class="btn-primary">Load Quiz Questions</button>
            <div id="quiz-container" class="results-area">
                <p style="color: gray;">Click the button above to begin.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('generate-btn');
            const container = document.getElementById('quiz-container');

            btn.addEventListener('click', async () => {
                container.innerHTML = "<p>Loading questions...</p>";

                try {
                    const response = await fetch("/api/quiz", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ topics: "economics" })
                    });

                    if (!response.ok) throw new Error('Network response was not ok');
                    const questions = await response.json();

                    container.innerHTML = "";
                    
                    questions.forEach((q, i) => {
                        const div = document.createElement('div');
                        div.className = 'quiz-card';
                        div.innerHTML = `
                            <h3>${i + 1}. ${q.question}</h3>
                            <div class="options">
                                ${q.options.map(opt => `<button class="opt-btn">${opt}</button>`).join('')}
                            </div>
                        `;
                        container.appendChild(div);
                    });
                } catch (err) {
                    container.innerHTML = "<p>Error loading quiz. Please check your connection.</p>";
                    console.error("Quiz Error:", err);
                }
            });
        });
    </script>
</body>
</html>
