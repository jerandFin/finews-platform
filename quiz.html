<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Mastery — FinNews</title>
    <!-- (C) Linking styles correctly from public/css -->
    <link rel="stylesheet" href="/public/css/styles.css">
    <style>
        .quiz-card { background: #fff; border: 1px solid #ddd; padding: 20px; margin: 15px 0; border-radius: 8px; }
        .opt-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; text-align: left; }
    </style>
</head>
<body>
    <div id="quiz-container">
        <h1>Economic Reasoning Quiz</h1>
        <button id="gen-btn">Generate Unlimited Questions</button>
        <div id="quiz-wrapper"></div>
    </div>

    <script>
        const btn = document.getElementById('gen-btn');
        const wrapper = document.getElementById('quiz-wrapper');

        btn.addEventListener('click', async () => {
            // (D) CORE FIX: Wipe UI immediately so you don't see old questions
            wrapper.innerHTML = "<p>Analyzing fresh market patterns...</p>";
            
            try {
                // Cache-buster T ensures Render treats this as a brand new request
                const res = await fetch(`/api/quiz?t=${Date.now()}`, { method: 'POST' });
                const data = await res.json();
                
                wrapper.innerHTML = ""; // Clear the loading text

                data.forEach((q, i) => {
                    const card = document.createElement('div');
                    card.className = 'quiz-card';
                    card.innerHTML = `
                        <p><strong>${i+1}. ${q.question}</strong></p>
                        ${q.options.map(opt => `<button class="opt-btn">${opt}</button>`).join('')}
                    `;
                    wrapper.appendChild(card);
                });
            } catch (e) {
                wrapper.innerHTML = "<p>Connection delayed. Please try again.</p>";
            }
        });
    </script>
</body>
</html>
