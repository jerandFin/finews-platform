<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinNews Quiz — Test Your Knowledge</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/styles.css">

  <style>
    :root {
      --gold: #F5C842; --gold-dark: #C9960A; --teal: #00C9A7;
      --bg: #0F1117; --bg2: #181C27; --bg3: #1E2333;
      --text: #F0F2FF; --text-muted: #8B90A8;
      --border: rgba(255,255,255,0.08); --radius: 16px; --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .nav-logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--gold); text-decoration: none; }
    .nav-back { font-size: 14px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; }
    .wrapper { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .screen-title { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .screen-title span { color: var(--gold); }
    .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 32px; }
    .topic-card { background: var(--bg2); border: 2px solid var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .topic-card.selected { border-color: var(--gold); background: rgba(245,200,66,0.1); }
    .start-btn { display: block; width: 100%; padding: 18px; background: var(--gold); color: #0F1117; font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; border: none; border-radius: var(--radius); cursor: pointer; transition: transform 0.2s; }
    .start-btn:active { transform: scale(0.98); }
    .options-list { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
    .option-btn { padding: 16px 18px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); cursor: pointer; text-align: left; font-size: 16px; transition: all 0.2s; }
    .option-btn.correct { background: rgba(86,207,122,0.15); border-color: #56CF7A; color: #56CF7A; }
    .option-btn.wrong { background: rgba(255,107,107,0.12); border-color: #FF6B6B; color: #FF6B6B; }
    .explanation-box { background: var(--bg3); padding: 18px; border-radius: var(--radius-sm); display: none; margin-bottom: 20px; border-left: 4px solid var(--gold); font-size: 14px; line-height: 1.5; }
    .next-btn { width: 100%; padding: 16px; background: var(--gold); color: #0F1117; border: none; cursor: pointer; display: none; font-family: 'Syne'; font-weight: 700; border-radius: 8px; font-size: 16px; }
    #result-rank { font-family: 'Syne'; font-size: 80px; font-weight: 800; text-align: center; color: var(--gold); margin: 20px 0; }
    .loading-icon { animation: spin 1s linear infinite; font-size: 48px; margin-bottom: 20px; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-logo">FinNews</a>
  <a href="/" class="nav-back">← Back to News</a>
</nav>

<div class="wrapper">
  <!-- TOPIC SELECTION -->
  <div class="screen active" id="screen-topics">
    <h1 class="screen-title">FinNews <span>Quiz</span></h1>
    <p style="text-align:center; color:var(--text-muted); margin-bottom:40px;">Select topics to test your financial IQ.</p>
    <div class="topics-grid">
      <div class="topic-card" data-topic="Economics"><div style="font-size:24px;">📊</div><div>Economics</div></div>
      <div class="topic-card" data-topic="Stock Markets"><div style="font-size:24px;">📈</div><div>Stock Markets</div></div>
      <div class="topic-card" data-topic="Investing"><div style="font-size:24px;">💰</div><div>Investing</div></div>
      <div class="topic-card" data-topic="Business"><div style="font-size:24px;">🏢</div><div>Business</div></div>
    </div>
    <div id="topic-error" style="display:none; color:#FF6B6B; text-align:center; margin-bottom:15px; font-weight:600;">Please select at least one topic!</div>
    <button class="start-btn" id="start-btn">Generate My Quiz ✦</button>
  </div>

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div style="text-align:center; padding:60px 20px;">
      <div class="loading-icon">⏳</div>
      <h2 style="font-family:'Syne'; font-size:24px;">AI is crafting your questions...</h2>
      <p style="color:var(--text-muted); margin-top:10px;">Analyzing market data and economic trends.</p>
    </div>
  </div>

  <!-- QUIZ AREA -->
  <div class="screen" id="screen-quiz">
    <div style="display:flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
      <div id="quiz-topic-badge" style="background: var(--bg3); padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--gold); color: var(--gold); font-weight: 600;">Quiz Active</div>
      <div style="font-weight: 600;">Score: <span id="score-val" style="color: var(--gold);">0</span></div>
    </div>
    <div id="progress-label" style="font-size:13px; margin-bottom:12px; color: var(--text-muted);">Question 1 of 5</div>
    <div style="background:var(--bg2); padding:30px; border-radius:16px; margin-bottom:20px; border: 1px solid var(--border);">
      <div id="q-text" style="font-family:'Syne'; font-size:20px; line-height:1.4;"></div>
    </div>
    <div class="options-list" id="options-list"></div>
    <div class="explanation-box" id="explanation-box"></div>
    <button class="next-btn" id="next-btn">Next Question →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screen-result">
    <div id="result-rank">S</div>
    <h2 id="result-title" style="text-align:center; font-family:'Syne';">Market Master</h2>
    <p id="result-subtitle" style="text-align:center; margin: 15px 0 30px; color: var(--text-muted);"></p>
    <div style="text-align: center;">
      <button onclick="location.reload()" style="padding:16px 32px; background:var(--gold); border:none; border-radius:8px; cursor:pointer; font-weight:800; font-family:'Syne'; width: 200px;">Try Again</button>
    </div>
  </div>
</div>

<script>
  let selectedTopics = [];
  let questions = [];
  let current = 0;
  let score = 0;
  let answered = false;

  document.querySelectorAll('.topic-card').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('selected');
      selectedTopics = Array.from(document.querySelectorAll('.topic-card.selected')).map(c => c.dataset.topic);
      if(selectedTopics.length > 0) document.getElementById('topic-error').style.display = 'none';
    });
  });

  document.getElementById('start-btn').addEventListener('click', async () => {
    if (selectedTopics.length === 0) {
      document.getElementById('topic-error').style.display = 'block';
      return;
    }
    showScreen('screen-loading');
    await generateQuestions();
  });

  async function generateQuestions() {
    const topicStr = selectedTopics.join(', ');
    try {
      const response = await fetch("/api/quiz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topics: topicStr })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Server error");
      
      // CRITICAL FIX: Extract JSON array even if Claude adds text around it
      const rawText = data.content[0].text;
      const jsonMatch = rawText.match(/\[[\s\S]*\]/); 
      if (!jsonMatch) throw new Error("AI response was not in the correct format.");
      
      questions = JSON.parse(jsonMatch[0]);

      current = 0; score = 0;
      showScreen('screen-quiz');
      showQuestion();
    } catch (err) {
      console.error("Quiz Generation Failed:", err);
      alert("Failed to generate quiz: " + err.message);
      showScreen('screen-topics');
    }
  }

  function showQuestion() {
    answered = false;
    const q = questions[current];
    document.getElementById('q-text').textContent = q.question;
    document.getElementById('progress-label').textContent = `Question ${current + 1} of ${questions.length}`;
    
    const optList = document.getElementById('options-list');
    optList.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => {
        if(answered) return;
        answered = true;
        
        // Handle both index (0) and text matches for the answer
        const isCorrect = (typeof q.answer === 'number' && idx === q.answer) || 
                          (opt.trim() === String(q.answer).trim());
        
        if(isCorrect) {
          btn.classList.add('correct');
          score += 10;
        } else {
          btn.classList.add('wrong');
          // Highlight correct answer
          Array.from(optList.children).forEach((child, cIdx) => {
            if((typeof q.answer === 'number' && cIdx === q.answer) || (child.textContent.trim() === String(q.answer).trim())) {
              child.classList.add('correct');
            }
          });
        }
        document.getElementById('score-val').textContent = score;
        document.getElementById('explanation-box').innerHTML = `<strong>Explanation:</strong><br>${q.explanation}`;
        document.getElementById('explanation-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
      };
      optList.appendChild(btn);
    });
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    current++;
    if (current < questions.length) {
      document.getElementById('explanation-box').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      showQuestion();
    } else {
      showResult();
    }
  });

  function showResult() {
    showScreen('screen-result');
    const total = questions.length * 10;
    const pct = (score / total) * 100;
    
    let rank = 'B'; let title = 'Business Student';
    if(pct >= 90) { rank = 'S'; title = 'Economic Mastermind'; }
    else if(pct >= 70) { rank = 'A'; title = 'Market Analyst'; }

    document.getElementById('result-rank').textContent = rank;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-subtitle').textContent = `You cleared ${score} out of ${total} points.`;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>

</body>
</html>
