<script>
  let selectedTopics = [];
  let questions = [];
  let current = 0;
  let score = 0;
  let answered = false;

  document.querySelectorAll('.topic-card').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('selected');
      selectedTopics = Array.from(document.querySelectorAll('.topic-card.selected')).map(c => c.dataset.topic);
      if(selectedTopics.length > 0) document.getElementById('topic-error').style.display = 'none';
    });
  });

  document.getElementById('start-btn').addEventListener('click', async () => {
    if (selectedTopics.length === 0) {
      document.getElementById('topic-error').style.display = 'block';
      return;
    }
    showScreen('screen-loading');
    await generateQuestions();
  });

  async function generateQuestions() {
    const topicStr = selectedTopics.join(', ');
    try {
      const response = await fetch("/api/quiz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topics: topicStr })
      });

      // Layer 1: Check if the server actually sent a successful response
      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error || `Server returned status ${response.status}`);
      }

      // Layer 2: Check if 'content' and index '0' exist before reading them
      // This is exactly where your "undefined reading 0" error happened.
      if (!data.content || !data.content[0] || !data.content[0].text) {
        console.error("Malformed AI Response:", data);
        throw new Error("AI returned an empty or invalid response structure.");
      }
      
      const rawText = data.content[0].text;
      
      // Layer 3: Extract JSON array even if Claude adds text around it
      const jsonMatch = rawText.match(/\[[\s\S]*\]/); 
      if (!jsonMatch) {
        console.log("Raw text received:", rawText);
        throw new Error("AI response did not contain a valid quiz list.");
      }
      
      questions = JSON.parse(jsonMatch[0]);

      current = 0; score = 0;
      showScreen('screen-quiz');
      showQuestion();
    } catch (err) {
      // Improved error logging for your ASUS VivoBook console
      console.error("CRITICAL QUIZ FAILURE:", err);
      alert("Quiz Error: " + err.message);
      showScreen('screen-topics');
    }
  }

  function showQuestion() {
    answered = false;
    const q = questions[current];
    document.getElementById('q-text').textContent = q.question;
    document.getElementById('progress-label').textContent = `Question ${current + 1} of ${questions.length}`;
    
    const optList = document.getElementById('options-list');
    optList.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => {
        if(answered) return;
        answered = true;
        
        const isCorrect = (typeof q.answer === 'number' && idx === q.answer) || 
                          (opt.trim() === String(q.answer).trim());
        
        if(isCorrect) {
          btn.classList.add('correct');
          score += 10;
        } else {
          btn.classList.add('wrong');
          Array.from(optList.children).forEach((child, cIdx) => {
            if((typeof q.answer === 'number' && cIdx === q.answer) || (child.textContent.trim() === String(q.answer).trim())) {
              child.classList.add('correct');
            }
          });
        }
        document.getElementById('score-val').textContent = score;
        document.getElementById('explanation-box').innerHTML = `<strong>Explanation:</strong><br>${q.explanation}`;
        document.getElementById('explanation-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
      };
      optList.appendChild(btn);
    });
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    current++;
    if (current < questions.length) {
      document.getElementById('explanation-box').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      showQuestion();
    } else {
      showResult();
    }
  });

  function showResult() {
    showScreen('screen-result');
    const total = questions.length * 10;
    const pct = (score / total) * 100;
    
    let rank = 'B'; let title = 'Business Student';
    if(pct >= 90) { rank = 'S'; title = 'Economic Mastermind'; }
    else if(pct >= 70) { rank = 'A'; title = 'Market Analyst'; }

    document.getElementById('result-rank').textContent = rank;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-subtitle').textContent = `You cleared ${score} out of ${total} points.`;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>
