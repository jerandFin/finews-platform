<script>
  let selectedTopics = [];
  let questions = [];
  let current = 0;
  let score = 0;
  let answered = false;

  // Topic selection logic
  document.querySelectorAll('.topic-card').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('selected');
      selectedTopics = Array.from(document.querySelectorAll('.topic-card.selected')).map(c => c.dataset.topic);
      if(selectedTopics.length > 0) document.getElementById('topic-error').style.display = 'none';
    });
  });

  // Start button logic
  document.getElementById('start-btn').addEventListener('click', async () => {
    if (selectedTopics.length === 0) {
      document.getElementById('topic-error').style.display = 'block';
      return;
    }
    showScreen('screen-loading');
    await generateQuestions();
  });

  async function generateQuestions() {
    const topicStr = selectedTopics.join(', ');
    try {
      const response = await fetch("/api/quiz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topics: topicStr })
      });

      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error || `Server Error: ${response.status}`);
      }

      // Check if data.content exists (Anthropic specific structure)
      if (!data.content || !data.content[0]) {
        console.error("Data received:", data);
        throw new Error("AI returned no content. Check API credits/keys.");
      }
      
      const rawText = data.content[0].text;
      const jsonMatch = rawText.match(/\[[\s\S]*\]/); 
      
      if (!jsonMatch) {
        throw new Error("AI response format was invalid.");
      }
      
      questions = JSON.parse(jsonMatch[0]);

      if (questions.length === 0) throw new Error("No questions generated.");

      current = 0; 
      score = 0;
      showScreen('screen-quiz');
      showQuestion();
    } catch (err) {
      console.error("CRITICAL FAILURE:", err);
      alert("Error: " + err.message);
      showScreen('screen-topics');
    }
  }

  function showQuestion() {
    answered = false;
    const q = questions[current];
    
    // Safety check to prevent white screen
    if (!q) {
      console.error("Question at index " + current + " is missing.");
      return;
    }

    // SUPPORT FOR DIFFERENT AI PROPERTY NAMES
    const questionText = q.question || q.text || "Question content missing";
    const options = q.options || q.choices || q.answers || [];
    const correctAnswer = (q.answer !== undefined) ? q.answer : q.correctIndex;

    const qTextElem = document.getElementById('q-text');
    const progLabel = document.getElementById('progress-label');
    const optList = document.getElementById('options-list');

    if (!qTextElem || !optList) {
        console.error("UI Elements not found! Check your HTML IDs.");
        return;
    }

    qTextElem.textContent = questionText;
    progLabel.textContent = `Question ${current + 1} of ${questions.length}`;
    optList.innerHTML = '';
    
    options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => {
        if(answered) return;
        answered = true;
        
        // Match by index or by string text
        const isCorrect = (idx === correctAnswer) || (opt.trim() === String(correctAnswer).trim());
        
        if(isCorrect) {
          btn.classList.add('correct');
          score += 10;
        } else {
          btn.classList.add('wrong');
          // Highlight correct one
          Array.from(optList.children).forEach((child, cIdx) => {
            if(cIdx === correctAnswer || child.textContent.trim() === String(correctAnswer).trim()) {
              child.classList.add('correct');
            }
          });
        }
        document.getElementById('score-val').textContent = score;
        const expBox = document.getElementById('explanation-box');
        expBox.innerHTML = `<strong>Explanation:</strong><br>${q.explanation || "No explanation provided."}`;
        expBox.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
      };
      optList.appendChild(btn);
    });
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    current++;
    if (current < questions.length) {
      document.getElementById('explanation-box').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      showQuestion();
    } else {
      showResult();
    }
  });

  function showResult() {
    showScreen('screen-result');
    const total = questions.length * 10;
    const pct = (score / total) * 100;
    
    let rank = 'B'; 
    let title = 'Business Student';
    if(pct >= 90) { rank = 'S'; title = 'Economic Mastermind'; }
    else if(pct >= 70) { rank = 'A'; title = 'Market Analyst'; }

    document.getElementById('result-rank').textContent = rank;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-subtitle').textContent = `You cleared ${score} out of ${total} points.`;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
  }
</script>
