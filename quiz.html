<script>
        let selectedTopics = [];
        let questions = [];
        let current = 0;
        let score = 0;
        let answered = false;

        // 1. Topic Selection Logic
        document.querySelectorAll('.topic-card').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('selected');
                selectedTopics = Array.from(document.querySelectorAll('.topic-card.selected')).map(c => c.dataset.topic);
                const err = document.getElementById('topic-error');
                if(err && selectedTopics.length > 0) err.style.display = 'none';
            });
        });

        // 2. Start Logic
        document.getElementById('start-btn').addEventListener('click', async () => {
            if (selectedTopics.length === 0) {
                const err = document.getElementById('topic-error');
                if(err) err.style.display = 'block';
                return;
            }
            showScreen('screen-loading');
            await generateQuestions();
        });

        // 3. FIXED FETCH LOGIC (Matches your Stable Server)
        async function generateQuestions() {
            try {
                const response = await fetch("/api/quiz", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topics: selectedTopics.join(', ') })
                });

                if (!response.ok) throw new Error("Server communication failed");

                // DIRECT PARSE: We no longer look for data.content[0].text
                const data = await response.json();
                
                if (Array.isArray(data) && data.length > 0) {
                    questions = data;
                    current = 0; 
                    score = 0;
                    showScreen('screen-quiz');
                    showQuestion();
                } else {
                    throw new Error("No questions received from server");
                }

            } catch (err) {
                console.error("Quiz Error:", err);
                alert("Quiz Load Error: Check your Render logs or API keys.");
                showScreen('screen-topics');
            }
        }

        // 4. UI Display (Simplified for stability)
        function showQuestion() {
            answered = false;
            const q = questions[current];
            if (!q) return;

            document.getElementById('q-text').textContent = q.question;
            document.getElementById('progress-label').textContent = `Question ${current + 1} of ${questions.length}`;
            
            const optList = document.getElementById('options-list');
            optList.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => {
                    if(answered) return;
                    answered = true;
                    
                    const isCorrect = (opt === q.correctAnswer);
                    
                    if(isCorrect) {
                        btn.classList.add('correct');
                        score += 10;
                    } else {
                        btn.classList.add('wrong');
                        // Highlight the right answer
                        Array.from(optList.children).forEach(child => {
                            if(child.textContent === q.correctAnswer) child.classList.add('correct');
                        });
                    }
                    
                    document.getElementById('score-val').textContent = score;
                    const exp = document.getElementById('explanation-box');
                    exp.innerHTML = `<strong>Answer:</strong> ${q.correctAnswer}`;
                    exp.style.display = 'block';
                    document.getElementById('next-btn').style.display = 'block';
                };
                optList.appendChild(btn);
            });
        }

        // 5. Navigation & Screen Switching
        document.getElementById('next-btn').addEventListener('click', () => {
            current++;
            if (current < questions.length) {
                document.getElementById('explanation-box').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
                showQuestion();
            } else {
                showResult();
            }
        });

        function showResult() {
            showScreen('screen-result');
            const total = questions.length * 10;
            const pct = (score / total) * 100;
            let rank = pct >= 80 ? 'S' : pct >= 60 ? 'A' : 'B';
            let title = pct >= 80 ? 'Market Master' : 'Analyst';

            document.getElementById('result-rank').textContent = rank;
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-subtitle').textContent = `Final Score: ${score} / ${total}`;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if (target) {
                target.classList.add('active');
                window.scrollTo(0,0);
            }
        }
    </script>
