<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinNews Quiz — Test Your Knowledge</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- 
    FIX 1: CORRECTED PATH FOR RENDER
    Your server.js uses app.use("/public", ...), so all CSS must start with /public/
  -->
  <link rel="stylesheet" href="/public/css/styles.css">

  <style>
    /* Inline styles for quiz-specific layout kept here for speed */
    :root {
      --gold: #F5C842; --gold-dark: #C9960A; --teal: #00C9A7;
      --teal-dark: #009E84; --coral: #FF6B6B; --coral-dark: #D94444;
      --blue: #4A90D9; --purple: #7B6CF6; --green: #56CF7A;
      --bg: #0F1117; --bg2: #181C27; --bg3: #1E2333;
      --text: #F0F2FF; --text-muted: #8B90A8;
      --border: rgba(255,255,255,0.08); --radius: 16px; --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .nav-logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--gold); text-decoration: none; }
    .nav-back { font-size: 14px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; }
    .wrapper { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .screen-title { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .screen-title span { color: var(--gold); }
    .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 32px; }
    .topic-card { background: var(--bg2); border: 2px solid var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .topic-card.selected { border-color: var(--gold); background: rgba(245,200,66,0.08); }
    .start-btn { display: block; width: 100%; padding: 18px; background: var(--gold); color: #0F1117; font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; border: none; border-radius: var(--radius); cursor: pointer; }
    .options-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .option-btn { padding: 16px 18px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); cursor: pointer; text-align: left; }
    .option-btn.correct { background: rgba(86,207,122,0.15); border-color: var(--green); color: #56CF7A; }
    .option-btn.wrong { background: rgba(255,107,107,0.12); border-color: var(--coral); color: var(--coral); }
    .explanation-box { background: var(--bg3); padding: 14px 18px; border-radius: var(--radius-sm); display: none; margin-bottom: 20px; border-left: 4px solid var(--gold); }
    .next-btn { width: 100%; padding: 16px; background: var(--bg3); color: var(--text); border: 1px solid var(--border); cursor: pointer; display: none; font-family: 'Syne'; font-weight: 700; border-radius: 8px; }
    #result-rank { font-family: 'Syne'; font-size: 72px; font-weight: 800; text-align: center; color: var(--gold); }
    #result-title, #result-subtitle { text-align: center; }
    .loading-icon { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-logo">FinNews</a>
  <a href="/" class="nav-back">← Back to News</a>
</nav>

<div class="wrapper">
  <!-- TOPIC SELECTION -->
  <div class="screen active" id="screen-topics">
    <h1 class="screen-title">FinNews <span>Quiz</span></h1>
    <p style="text-align:center; color:var(--text-muted); margin-bottom:40px;">Select topics to test your financial IQ.</p>

    <div class="topics-grid">
      <div class="topic-card" data-topic="Economics"><div class="topic-icon">📊</div><div class="topic-name">Economics</div></div>
      <div class="topic-card" data-topic="Stock Markets"><div class="topic-icon">📈</div><div class="topic-name">Stock Markets</div></div>
      <div class="topic-card" data-topic="Investing"><div class="topic-icon">💰</div><div class="topic-name">Investing</div></div>
      <div class="topic-card" data-topic="Business"><div class="topic-icon">🏢</div><div class="topic-name">Business</div></div>
    </div>

    <div class="error-box" id="topic-error" style="display:none; color:var(--coral); text-align:center; margin-bottom:10px;">Please select a topic.</div>
    <button class="start-btn" id="start-btn">Generate My Quiz ✦</button>
  </div>

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div style="text-align:center; padding:80px;">
      <div class="loading-icon" style="font-size:40px;">⚡</div>
      <div style="font-family:'Syne'; font-size:24px; margin-top:20px;">AI is crafting your questions...</div>
    </div>
  </div>

  <!-- QUIZ AREA -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-topbar" style="display:flex; justify-content: space-between; margin-bottom: 20px;">
      <div class="quiz-topic-badge" id="quiz-topic-badge" style="background: var(--bg3); padding: 5px 15px; border-radius: 20px; font-size: 12px; border: 1px solid var(--gold);">Quiz Active</div>
      <div class="quiz-score">Score: <span id="score-val" style="color: var(--gold); font-weight: bold;">0</span></div>
    </div>
    <div id="progress-label" style="font-size:12px; margin:10px 0; color: var(--text-muted);">Question 1 of 10</div>
    <div class="question-card" style="background:var(--bg2); padding:30px; border-radius:16px; margin-bottom:20px; border: 1px solid var(--border);">
      <div class="question-text" id="q-text" style="font-family:'Syne'; font-size:20px;"></div>
    </div>
    <div class="options-list" id="options-list"></div>
    <div class="explanation-box" id="explanation-box"></div>
    <button class="next-btn" id="next-btn">Next Question →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screen-result">
    <div id="result-rank"></div>
    <h2 id="result-title" style="margin-top: 10px;"></h2>
    <p id="result-subtitle" style="margin-bottom:30px; color: var(--text-muted);"></p>
    <div style="text-align: center;">
        <button class="btn-replay" onclick="location.reload()" style="padding:15px 30px; background:var(--gold); border:none; border-radius:8px; cursor:pointer; font-weight:800; font-family: 'Syne';">Try Again</button>
    </div>
  </div>
</div>

<script>
  let selectedTopics = [];
  let questions = [];
  let current = 0;
  let score = 0;
  let answered = false;

  document.querySelectorAll('.topic-card').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('selected');
      selectedTopics = Array.from(document.querySelectorAll('.topic-card.selected')).map(c => c.dataset.topic);
      if(selectedTopics.length > 0) document.getElementById('topic-error').style.display = 'none';
    });
  });

  document.getElementById('start-btn').addEventListener('click', async () => {
    if (selectedTopics.length === 0) {
      document.getElementById('topic-error').style.display = 'block';
      return;
    }
    showScreen('screen-loading');
    await generateQuestions();
  });

  async function generateQuestions() {
    const topicStr = selectedTopics.join(', ');
    try {
      const response = await fetch("/api/quiz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topics: topicStr })
      });

      if (!response.ok) throw new Error("Server error");
      const data = await response.json();
      
      // Extract the text content from Claude's response
      const rawText = data.content[0].text.trim();
      // Use regex to extract only the JSON part if Claude adds conversational text
      const jsonMatch = rawText.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error("Invalid AI response format");
      
      questions = JSON.parse(jsonMatch[0]);

      current = 0; score = 0;
      showScreen('screen-quiz');
      showQuestion();
    } catch (err) {
      console.error(err);
      alert("Failed to generate quiz. Make sure your server is running and API keys are set!");
      showScreen('screen-topics');
    }
  }

  function showQuestion() {
    answered = false;
    const q = questions[current];
    document.getElementById('q-text').textContent = q.question;
    document.getElementById('progress-label').textContent = `Question ${current + 1} of ${questions.length}`;
    
    const optList = document.getElementById('options-list');
    optList.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => {
        if(answered) return;
        answered = true;
        
        // q.answer might be the index (0-3) or the string. We'll check both.
        const isCorrect = (typeof q.answer === 'number' && idx === q.answer) || (opt === q.answer);
        
        if(isCorrect) {
          btn.classList.add('correct');
          score += 10;
        } else {
          btn.classList.add('wrong');
          // Highlight the correct one
          Array.from(optList.children).forEach((child, cIdx) => {
              if((typeof q.answer === 'number' && cIdx === q.answer) || (child.textContent === q.answer)) {
                  child.classList.add('correct');
              }
          });
        }
        document.getElementById('score-val').textContent = score;
        document.getElementById('explanation-box').textContent = q.explanation || "No explanation provided.";
        document.getElementById('explanation-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
      };
      optList.appendChild(btn);
    });
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    current++;
    if (current < questions.length) {
      document.getElementById('explanation-box').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      showQuestion();
    } else {
      showResult();
    }
  });

  function showResult() {
    showScreen('screen-result');
    const totalPossible = questions.length * 10;
    const pct = (score / totalPossible) * 100;
    
    let rank = 'C';
    let title = 'Student';
    
    if(pct >= 90) { rank = 'S'; title = 'Economic Mastermind'; }
    else if(pct >= 70) { rank = 'A'; title = 'Market Analyst'; }
    else if(pct >= 50) { rank = 'B'; title = 'Business Junior'; }

    document.getElementById('result-rank').textContent = rank;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-subtitle').textContent = `You scored ${score} out of ${totalPossible} points!`;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>

<!-- 
  FIX 2: JS PATH
  Removed duplicate scripts and fixed path to /public/js/
-->
<script src="/public/js/app.js"></script>

</body>
</html>
