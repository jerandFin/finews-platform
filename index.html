<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinNews — Financial News Platform</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- (C) PATHS: Styles under /public/css/ folder -->
  <link rel="stylesheet" href="/public/css/styles.css">
</head>

<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <h1 class="logo">FinNews</h1>
        <p class="tagline">Markets • Business • Economy</p>
        <p class="tagline">Jerand Lau</p>
      </div>
      <div class="header-date" id="current-date"></div>
    </div>
  </header>

  <nav class="category-nav">
    <div class="nav-inner">
      <button class="nav-btn active" data-category="business">Business</button>
      <button class="nav-btn" data-category="technology">Technology</button>
      <button class="nav-btn" data-category="science">Science</button>
      <button class="nav-btn" data-category="health">Health</button>
      <button class="nav-btn" id="reading-list-btn" data-category="saved">📑 Reading List</button>

      <!-- (B) & (C) Navigation to Quiz Page in main root -->
      <a href="/quiz" class="nav-btn quiz-nav-btn">🎯 Quiz</a>
    </div>
  </nav>

  <!-- (D) THE TIMER FIX: Standardized IDs for the app.js Countdown -->
  <div id="refresh-status" class="refresh-status">
    <span id="last-updated-text">Last updated: just now</span>
    <span class="refresh-divider">·</span>
    <span>Refreshing in <span id="countdown-timer">5:00</span></span>
    <!-- Matches getElementById('refresh-now') in your app.js -->
    <button id="refresh-now" title="Refresh now">
      <span id="refresh-icon">↻</span> Refresh Now
    </button>
  </div>

  <div class="search-section">
    <div class="search-inner">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="Search headlines... (e.g. Tesla, inflation, Fed)"
      />
      <button class="search-btn" id="search-btn">Search</button>
      <button class="clear-btn" id="clear-btn" style="display:none;">✕ Clear</button>
    </div>
  </div>

  <main class="main-content">
    <!-- (A) RENDER STABILITY: Skeleton loaders to prevent layout shift errors -->
    <div class="loading-state" id="loading">
      <div class="skeleton-grid">
        <div class="skeleton-card"><div class="skeleton skeleton-image"></div></div>
        <div class="skeleton-card"><div class="skeleton skeleton-image"></div></div>
        <div class="skeleton-card"><div class="skeleton skeleton-image"></div></div>
      </div>
    </div>

    <!-- (A) RENDER STABILITY: Error container if API fails -->
    <div class="error-state" id="error" style="display:none;">
      <p>The news feed is currently updating. Please try again in a moment.</p>
    </div>

    <div class="featured-banner" id="featured-banner"></div>
    <div class="articles-grid" id="articles-grid"></div>
  </main>

  <footer class="site-footer">
    <p>© 2026 FinNews Platform · Built by Jerand Lau · Data provided by NewsAPI</p>
  </footer>

  <!-- (C) PATHS: app.js under /public/js/ folder -->
  <script src="/public/js/app.js"></script>

</body>
</html>
